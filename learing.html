<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>启航教育在线 - 首页</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
    body { 
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
        background-color: #f8f9fb; 
    }
    /* 自定义滚动条样式 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    
    /* 模拟图片的虚线框 */
    .placeholder-box { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 2rem; 
        font-weight: bold; 
        opacity: 0.5; 
    }
    
    /* 让卡片悬停时稍微上浮一点 */
    .hover-card {
        transition: all 0.3s ease;
    }
    .hover-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
</style>
</head>
<body>
	<section class="container mx-auto px-4 mt-16 mb-20">
        <h2 class="text-2xl font-bold text-center text-gray-900 mb-10">我的学习中心</h2>
        
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 flex flex-col lg:flex-row min-h-[600px]">
            <div class="lg:w-1/4 border-r border-gray-100 bg-gray-50 p-6">
                <h3 class="font-bold text-gray-800 mb-6 text-lg">我的课程</h3>
                
                <div class="space-y-4">
                    <div class="bg-blue-50 border-l-4 border-blue-600 p-4 rounded shadow-sm cursor-pointer">
                        <div class="font-bold text-blue-700 text-sm mb-2">Python零基础入门</div>
                        <div class="w-full bg-blue-200 h-1.5 rounded-full">
                            <div class="bg-blue-600 h-1.5 rounded-full" style="width: 45%"></div>
                        </div>
                        <div class="text-xs text-blue-500 mt-1">进度: 45%</div>
                    </div>

                    <div class="hover:bg-white p-4 rounded cursor-pointer transition border-l-4 border-transparent hover:border-gray-200">
                        <div class="font-medium text-gray-600 text-sm mb-2">现代UI/UX设计核心</div>
                        <div class="w-full bg-gray-200 h-1.5 rounded-full">
                            <div class="bg-green-500 h-1.5 rounded-full" style="width: 15%"></div>
                        </div>
                        <div class="text-xs text-gray-400 mt-1">进度: 15%</div>
                    </div>
                </div>
            </div>

            <div class="lg:w-3/4 p-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-1">Python零基础入门</h2>
                <p class="text-gray-500 text-sm mb-6">当前章节：3-2 变量与数据类型</p>

                <div class="w-full aspect-video bg-slate-800 rounded-lg flex items-center justify-center mb-6 text-white text-4xl font-mono">
                    <div class="border-2 border-white border-dashed p-4 rounded opacity-50">
                        ?? 视频播放区 ??
                    </div>
                </div>

                <div class="border-b border-gray-200 mb-6">
                    <nav class="flex space-x-8">
                        <a href="#" class="border-blue-500 text-blue-600 font-bold border-b-2 py-4 px-1 text-sm">课程大纲</a>
                        <a href="#" class="border-transparent text-gray-500 hover:text-gray-700 border-b-2 py-4 px-1 text-sm transition">问答讨论</a>
                        <a href="#" class="border-transparent text-gray-500 hover:text-gray-700 border-b-2 py-4 px-1 text-sm transition">课程资料</a>
                    </nav>
                </div>

                <div class="space-y-2">
                    <div class="bg-gray-50 p-3 rounded text-gray-500 flex justify-between">
                        <span><i class="fas fa-check-circle text-green-500 mr-2"></i> 1-1 课程介绍</span>
                        <span class="text-xs">12:30</span>
                    </div>
                    <div class="bg-blue-50 border border-blue-100 p-3 rounded text-blue-700 font-bold flex justify-between">
                        <span><i class="fas fa-play-circle mr-2"></i> 2-1 变量与数据类型 (正在学习)</span>
                        <span class="text-xs">正在播放</span>
                    </div>
                    <div class="bg-white p-3 rounded hover:bg-gray-50 text-gray-500 flex justify-between cursor-pointer">
                        <span><i class="far fa-circle mr-2"></i> 2-2 运算符</span>
                        <span class="text-xs">22:05</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
	<footer class="bg-white border-t border-gray-200 py-8 mt-auto">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            <p class="mb-2">&copy; 2025 启航教育在线. 保留所有权利.</p>
            <div class="flex justify-center space-x-6 mt-4">
                <a href="#" class="hover:text-blue-600">关于我们</a>
                <a href="#" class="hover:text-blue-600">联系我们</a>
                <a href="#" class="hover:text-blue-600">隐私政策</a>
            </div>
        </div>
    </footer>
</body>
</html>
