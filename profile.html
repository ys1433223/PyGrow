<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>启航教育 - 个人资料设置</title>
    <!-- 引入鉴权与通用功能 -->
    <script src="js/auth.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: #f8f9fb; }
        .avatar-option { transition: all 0.2s; border: 3px solid transparent; }
        .avatar-option:hover { transform: scale(1.1); }
        .avatar-option.selected { border-color: #2563eb; transform: scale(1.1); box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .fade-in-up { animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="flex flex-col min-h-screen">

    <!-- 全局加载动画 -->
    <div id="page-loader" class="fixed inset-0 z-[100] bg-blue-600 flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <div class="relative mb-8 animate-bounce">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-blue-600 shadow-xl">
                <span class="text-3xl font-bold">Q</span>
            </div>
        </div>
        <h2 class="text-3xl font-bold mb-2 tracking-widest">启航教育</h2>
        <div class="w-64 h-2 bg-blue-800 rounded-full overflow-hidden relative">
            <div id="loader-progress" class="h-full bg-white transition-all duration-100 ease-out" style="width: 0%"></div>
        </div>
        <div id="loader-text" class="mt-2 font-mono text-xs opacity-70">0%</div>
    </div>

    <!-- 导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a href="main.html" class="flex items-center space-x-2 cursor-pointer">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white">
                        <i class="fas fa-compass"></i>
                    </div>
                    <span class="text-xl font-bold text-gray-800">启航教育在线</span>
                </a>
            </div>
            <nav class="hidden md:flex space-x-8 text-gray-600 font-medium text-sm">
                <a href="main.html" class="hover:text-blue-600 transition">首页</a>
                <a href="clscenter.html" class="hover:text-blue-600 transition">课程中心</a>
                <a href="comment.html" class="hover:text-blue-600 transition">论坛</a>
                <a href="Transition.html" class="hover:text-blue-600 transition">学习中心</a>
                <a href="resources.html" class="hover:text-blue-600 transition">资源中心</a>
            </nav>
            <div class="flex items-center space-x-6">
                 <!-- 白天黑夜切换按钮 -->
                 <div class="relative w-16 h-8 flex items-center justify-center mr-2">
                     <theme-button id="theme-toggle" size="0.6" style="cursor: pointer;"></theme-button>
                </div>
                <div id="header-auth-area"></div>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="flex-grow container mx-auto px-4 py-8 fade-in-up">
        
        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
            
            <!-- 顶部背景 -->
            <div class="h-32 bg-gradient-to-r from-blue-500 to-purple-600 relative">
                <div class="absolute -bottom-12 left-1/2 -translate-x-1/2">
                    <div class="relative group">
                        <!-- 头像预览图 -->
                        <img id="currentAvatarPreview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" 
                             class="w-24 h-24 rounded-full border-4 border-white shadow-md bg-gray-100 object-cover">
                        
                        <!-- 📸 上传按钮 (修改了这里) -->
                        <div class="absolute bottom-0 right-0 bg-white rounded-full p-2 shadow-md border border-gray-200 cursor-pointer hover:bg-gray-50 transition transform hover:scale-110" 
                             onclick="triggerFileUpload()" 
                             title="上传本地图片">
                            <i class="fas fa-camera text-gray-600 text-sm"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 📂 隐藏的文件输入框 (核心组件) -->
            <input type="file" id="avatarUploadInput" accept="image/*" class="hidden" onchange="handleFileUpload(event)">

            <div class="pt-16 pb-8 px-8">
                <h1 class="text-2xl font-bold text-center text-gray-800 mb-8">编辑个人资料</h1>

                <form onsubmit="saveProfile(event)" class="space-y-8">
                    
                    <!-- 1. 修改昵称 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">我的昵称</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
                            <input type="text" id="nicknameInput" required maxlength="12"
                                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition"
                                   placeholder="给自己起个好听的名字">
                        </div>
                        <p class="text-xs text-gray-400 mt-1">昵称长度限制在 12 个字符以内。</p>
                    </div>

                    <!-- 2. 选择头像 -->
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <label class="block text-sm font-bold text-gray-700">推荐头像</label>
                            <button type="button" onclick="generateRandomAvatar()" class="text-xs text-blue-600 hover:underline">
                                <i class="fas fa-random mr-1"></i> 随机生成
                            </button>
                        </div>
                        
                        <div class="grid grid-cols-4 sm:grid-cols-6 gap-3 mb-4" id="avatarGrid">
                            <!-- 预设头像将通过 JS 生成在这里 -->
                        </div>
                        
                        <!-- 隐藏的输入框，用于存储最终选中的头像数据 (URL 或 Base64) -->
                        <input type="hidden" id="selectedAvatarUrl">
                    </div>

                    <!-- 底部按钮 -->
                    <div class="flex items-center space-x-4 pt-4 border-t border-gray-100">
                        <button type="submit" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700 transition shadow-md hover:-translate-y-0.5">
                            保存修改
                        </button>
                        <a href="main.html" class="flex-1 text-center bg-gray-100 text-gray-600 py-2.5 rounded-lg font-medium hover:bg-gray-200 transition">
                            取消
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </main>

    <footer class="bg-white border-t border-gray-200 py-8 mt-auto">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            <p class="mb-2">&copy; 2025 启航教育在线. 保留所有权利.</p>
        </div>
    </footer>

    <!-- 逻辑脚本 -->
    <script>
        // 预设的头像种子 (DiceBear API)
        const seeds = ['Felix', 'Aneka', 'Bob', 'Coco', 'Dave', 'Granny', 'Jack', 'Lola', 'Milo', 'Nala'];
        let currentAvatar = '';

        document.addEventListener("DOMContentLoaded", function() {
            loadUserProfile();
            initAvatarGrid();
            // 引入白天黑夜组件
            const toggle = document.querySelector('theme-button');
                if(toggle) {
                    toggle.addEventListener('change', e => {
                       if (e.detail === 'dark') {
                           document.body.classList.add('dark-mode');
                       } else {
                           document.body.classList.remove('dark-mode');
                       }
                    });
                }
        });

        // 1. 加载当前用户信息
        function loadUserProfile() {
            const userStr = localStorage.getItem('userInfo');
            if (userStr) {
                const user = JSON.parse(userStr);
                document.getElementById('nicknameInput').value = user.name || '';
                currentAvatar = user.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.name}`;
                updatePreview(currentAvatar);
            } else {
                alert('请先登录！');
                window.location.href = 'login.html';
            }
        }

        // 2. 初始化头像选择网格
        function initAvatarGrid() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = ''; 

            seeds.forEach(seed => {
                const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`;
                const div = document.createElement('div');
                div.className = 'cursor-pointer relative group';
                div.innerHTML = `
                    <img src="${url}" class="avatar-option w-full aspect-square rounded-full bg-gray-50 p-1" onclick="selectAvatar('${url}', this)">
                `;
                grid.appendChild(div);
            });
        }

        // 3. 选中某个预设头像
        window.selectAvatar = function(url, el) {
            currentAvatar = url;
            updatePreview(url);
            // 更新选中样式
            document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('selected'));
            if(el) el.classList.add('selected');
        }

        // 4. 随机生成
        window.generateRandomAvatar = function() {
            const randomSeed = Math.random().toString(36).substring(7);
            const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${randomSeed}`;
            selectAvatar(url, null); 
        }

        // ==========================================
        // 📸 核心新增：本地文件上传逻辑
        // ==========================================
        
        // A. 触发文件选择器
        window.triggerFileUpload = function() {
            document.getElementById('avatarUploadInput').click();
        }

        // B. 处理文件选中
        window.handleFileUpload = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 限制文件大小 (例如 1MB)，防止 LocalStorage 爆满
            if (file.size > 1024 * 1024) {
                alert("图片太大了！为了保证网站速度，请上传小于 1MB 的图片。");
                return;
            }

            // 使用 FileReader 读取图片并转换为 Base64
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                
                // 更新预览和数据
                currentAvatar = base64Data;
                updatePreview(base64Data);
                
                // 清除网格选中状态
                document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('selected'));
            };
            reader.readAsDataURL(file);
        }

        // 5. 更新顶部预览图
        function updatePreview(url) {
            document.getElementById('currentAvatarPreview').src = url;
            document.getElementById('selectedAvatarUrl').value = url;
        }

        // 6. 保存修改
        window.saveProfile = function(e) {
            e.preventDefault(); 

            const newName = document.getElementById('nicknameInput').value.trim();
            const newAvatar = document.getElementById('selectedAvatarUrl').value;

            if (!newName) {
                alert("昵称不能为空哦！");
                return;
            }

            // 尝试保存到 LocalStorage
            try {
                const userInfo = {
                    name: newName,
                    avatar: newAvatar,
                    loginTime: new Date().toLocaleString()
                };
                localStorage.setItem('userInfo', JSON.stringify(userInfo));
                
                alert("✅ 个人资料保存成功！");
                window.location.href = "main.html"; 
            } catch (err) {
                // 如果图片太大导致存储失败
                if (err.name === 'QuotaExceededError') {
                    alert("保存失败：图片文件太大，超出了浏览器存储限制。请换一张小一点的图片试试！");
                } else {
                    console.error(err);
                }
            }
        }
    </script>
    <!-- 引入白天黑夜组件脚本 -->
    <script src="js/day-night_script.js"></script>
</body>
</html>
