<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>启航教育 - 学习中心</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: #f8f9fb; }
        .hover-scale { transition: transform 0.2s; }
        .hover-scale:hover { transform: scale(1.02); }
    </style>
</head>

<body class="flex flex-col min-h-screen">
	<div id="page-loader" class="fixed inset-0 z-[100] bg-blue-600 flex flex-col items-center justify-center text-white transition-opacity duration-500">
    <div class="relative mb-8 animate-bounce">
        <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-blue-600 shadow-xl">
            <span class="text-3xl font-bold">Q</span>
        </div>
    </div>
    
    <h2 class="text-3xl font-bold mb-2 tracking-widest">启航教育</h2>
    <p class="text-blue-100 mb-8 text-sm">正在前往知识宇宙...</p>
    
    <div class="w-64 h-2 bg-blue-800 rounded-full overflow-hidden relative">
        <div id="loader-progress" class="h-full bg-white transition-all duration-100 ease-out shadow-[0_0_10px_rgba(255,255,255,0.5)]" style="width: 0%"></div>
    </div>
    
    <div id="loader-text" class="mt-2 font-mono text-xs opacity-70">0%</div>
</div>
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a href="main.html" class="flex items-center space-x-2 cursor-pointer">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white">
                        <i class="fas fa-compass"></i>
                    </div>
                    <span class="text-xl font-bold text-gray-800">启航教育在线</span>
                </a>
            </div>
            <nav class="hidden md:flex space-x-8 text-gray-600 foznt-medium text-sm">
                <a href="main.html" class="hover:text-blue-600 transition">首页</a>
                <a href="clscenter.html" class="hover:text-blue-600 transition">课程中心</a>
                <a href="comment.html" class="hover:text-blue-600 transition">论坛</a>
                <a href="Transition.html" class="text-gray-900 font-bold border-b-2 border-blue-600 pb-1">学习中心</a>
				<a href="resources.html" class="hover:text-blue-600 transition">资源中心</a>
            </nav>
            <div class="flex items-center space-x-6">
    
    			<div id="header-auth-area"></div>
				<div class="relative w-16 h-8 flex items-center justify-center mr-4">
             <theme-button id="theme-toggle" size="0.6" style="cursor: pointer;"></theme-button>
        </div>
			</div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 fade-in">
        <div class="container mx-auto max-w-5xl">
            
            <div class="text-center mb-12">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">欢迎来到学习控制台</h1>
                <p class="text-gray-500">学练结合，知行合一。请选择你的学习模式：</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
                
                <a href="my_courses.html" class="group relative bg-white rounded-2xl p-8 border border-gray-100 shadow-lg hover-card overflow-hidden cursor-pointer flex flex-col items-center text-center">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full -mr-16 -mt-16 transition-transform group-hover:scale-150"></div>
                    
                    <div class="relative z-10 w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-4xl mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300">
                        <i class="fas fa-book-open"></i>
                    </div>
                    
                    <h2 class="relative z-10 text-2xl font-bold text-gray-800 mb-3 group-hover:text-blue-600 transition-colors">我的课程</h2>
                    <p class="relative z-10 text-gray-500 mb-6 px-4">
                        回到课堂，继续你的视频学习进度。<br>
                        查看笔记、回顾知识点。
                    </p>
                    
                    <div class="relative z-10 mt-auto">
                        <span class="inline-flex items-center text-blue-600 font-bold group-hover:translate-x-2 transition-transform">
                            进入学习 <i class="fas fa-arrow-right ml-2"></i>
                        </span>
                    </div>
                </a>

                <a href="practice.html" class="group relative bg-white rounded-2xl p-8 border border-gray-100 shadow-lg hover-card overflow-hidden cursor-pointer flex flex-col items-center text-center">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-purple-50 rounded-full -mr-16 -mt-16 transition-transform group-hover:scale-150"></div>
                    
                    <div class="relative z-10 w-20 h-20 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-4xl mb-6 group-hover:bg-purple-600 group-hover:text-white transition-colors duration-300">
                        <i class="fas fa-code"></i>
                    </div>
                    
                    <h2 class="relative z-10 text-2xl font-bold text-gray-800 mb-3 group-hover:text-purple-600 transition-colors">实战练习</h2>
                    <p class="relative z-10 text-gray-500 mb-6 px-4">
                        纸上得来终觉浅，绝知此事要躬行。<br>
                        在线编程、完成作业与挑战。
                    </p>
                    
                    <div class="relative z-10 mt-auto">
                        <span class="inline-flex items-center text-purple-600 font-bold group-hover:translate-x-2 transition-transform">
                            开始练习 <i class="fas fa-arrow-right ml-2"></i>
                        </span>
                    </div>
                </a>

            </div>

            <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-50">
                    <div class="text-xs text-gray-400 mb-1">今日学习时长</div>
                    <div class="text-xl font-bold text-gray-800">45 <span class="text-xs font-normal text-gray-500">分钟</span></div>
                </div>
                <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-50">
                    <div class="text-xs text-gray-400 mb-1">已完成课程</div>
                    <div class="text-xl font-bold text-blue-600">3/12 <span class="text-xs font-normal text-gray-500">节</span></div>
                </div>
                <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-50">
                    <div class="text-xs text-gray-400 mb-1">练习通过率</div>
                    <div class="text-xl font-bold text-purple-600">85%</div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-8 mt-auto">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            <p class="mb-2">&copy; 2025 启航教育在线. 保留所有权利.</p>
            <div class="flex justify-center space-x-6 mt-4">
                <a href="#" class="hover:text-blue-600">关于我们</a>
                <a href="#" class="hover:text-blue-600">联系我们</a>
                <a href="#" class="hover:text-blue-600">隐私政策</a>
            </div>
        </div>
    </footer>

</body>
</html>
